<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1a1a1a"/>

  <!-- Brain - left hemisphere -->
  <path
    d="M 240,140
       C 190,140 150,170 150,210
       C 150,235 160,250 150,270
       C 140,290 130,300 135,330
       C 140,365 175,390 220,390
       L 240,390
       L 240,140 Z"
    fill="none"
    stroke="url(#g)"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Brain - right hemisphere -->
  <path
    d="M 272,140
       C 322,140 362,170 362,210
       C 362,235 352,250 362,270
       C 372,290 382,300 377,330
       C 372,365 337,390 292,390
       L 272,390
       L 272,140 Z"
    fill="none"
    stroke="url(#g)"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Brain stem -->
  <line x1="256" y1="390" x2="256" y2="420" stroke="url(#g)" stroke-width="20" stroke-linecap="round"/>

  <!-- Brain folds - left -->
  <path d="M 170,210 Q 200,230 240,220" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>
  <path d="M 155,280 Q 190,300 240,290" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>
  <path d="M 165,340 Q 200,355 240,350" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>

  <!-- Brain folds - right -->
  <path d="M 342,210 Q 312,230 272,220" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>
  <path d="M 357,280 Q 322,300 272,290" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>
  <path d="M 347,340 Q 312,355 272,350" fill="none" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>

  <!-- Neural connection dots -->
  <circle cx="200" cy="175" r="8" fill="#a3e635"/>
  <circle cx="312" cy="175" r="8" fill="#a3e635"/>
  <circle cx="256" cy="160" r="6" fill="#a3e635" opacity="0.7"/>
</svg>
